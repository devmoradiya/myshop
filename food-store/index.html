<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Food Store | Order Food Online</title>
    <meta name="description" content="Food Store - Order from your favorite restaurants near you.">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container header-content">
        <a class="brand" href="#" aria-label="Food Store home">
          <img class="brand-icon" src="assets/favicon.svg" alt="" aria-hidden="true">
          <span class="brand-name">Food Store</span>
        </a>
        <div class="header-actions">
          <div class="search">
            <input id="searchInput" type="search" placeholder="Search for restaurants or cuisines" aria-label="Search restaurants or cuisines">
          </div>
          <select id="sortSelect" aria-label="Sort restaurants">
            <option value="relevance">Relevance</option>
            <option value="delivery_time_asc">Delivery Time</option>
            <option value="rating_desc">Rating</option>
            <option value="cost_low_high">Cost: Low to High</option>
            <option value="cost_high_low">Cost: High to Low</option>
          </select>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <h1>Hungry? You're in the right place.</h1>
          <p>Order from your favorite restaurants near you.</p>
          <div id="categoryChips" class="chips" aria-label="Popular cuisines"></div>
        </div>
      </section>

      <section class="controls">
        <div class="container controls-content">
          <div class="filters" role="group" aria-label="Filters">
            <label class="filter"><input id="filterFast" type="checkbox"> Fast delivery</label>
            <label class="filter"><input id="filterRating" type="checkbox"> Rating 4.0+</label>
            <label class="filter"><input id="filterVeg" type="checkbox"> Pure Veg</label>
            <label class="filter"><input id="filterOffers" type="checkbox"> Offers</label>
          </div>
          <div class="results">
            <span id="resultsCount">0 places</span>
          </div>
        </div>
      </section>

      <section class="grid">
        <div class="container">
          <div id="cardGrid" class="card-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-content">
        <div class="brand-col">
          <a class="brand" href="#">
            <img class="brand-icon" src="assets/favicon.svg" alt="" aria-hidden="true">
            <span class="brand-name">Food Store</span>
          </a>
          <p class="muted">Made with ❤️ for demo purposes.</p>
        </div>
        <div class="links-col">
          <a href="#">About</a>
          <a href="#">Careers</a>
          <a href="#">Help</a>
          <a href="#">Privacy</a>
        </div>
      </div>
    </footer>

    <script src="app.js" defer></script>
  </body>
  </html>
